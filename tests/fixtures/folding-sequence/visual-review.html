<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Folding Sequence Fixture Review</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f4ef;
        color: #232323;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      h1 {
        font-size: 24px;
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 18px;
        max-width: 860px;
        color: #55504a;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 18px;
      }

      article {
        background: #fffdfa;
        border: 1px solid #d7d0c4;
        border-radius: 8px;
        padding: 14px;
      }

      h2 {
        font-size: 16px;
        margin: 0;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 8px 0 12px;
        font-size: 12px;
        color: #686159;
      }

      .pill {
        border: 1px solid #d6d0c7;
        border-radius: 999px;
        padding: 2px 8px;
      }

      svg {
        width: 100%;
        aspect-ratio: 1;
        background: #f8f7f3;
        border: 1px solid #ddd7ce;
        border-radius: 6px;
      }

      ul {
        margin: 12px 0 0;
        padding-left: 18px;
        color: #4d4944;
        font-size: 13px;
      }

      .line-b {
        stroke: #202124;
        stroke-width: 0.012;
      }

      .line-m {
        stroke: #d3342f;
        stroke-width: 0.01;
        stroke-dasharray: 0.035 0.018;
      }

      .line-v {
        stroke: #246fcb;
        stroke-width: 0.01;
        stroke-dasharray: 0.012 0.016;
      }

      .line-f {
        stroke: #7c858e;
        stroke-width: 0.008;
      }

      .line-u {
        stroke: #8b6f27;
        stroke-width: 0.008;
        stroke-dasharray: 0.02 0.02;
      }

      .vertex {
        fill: #242424;
        opacity: 0.72;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin: 10px 0 20px;
        font-size: 13px;
      }

      .legend span::before {
        content: "";
        display: inline-block;
        width: 28px;
        height: 0;
        margin-right: 6px;
        vertical-align: middle;
        border-top: 2px solid #202124;
      }

      .legend .m::before {
        border-top-color: #d3342f;
        border-top-style: dashed;
      }

      .legend .v::before {
        border-top-color: #246fcb;
        border-top-style: dotted;
      }

      .legend .f::before {
        border-top-color: #7c858e;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #1f2225;
          color: #f1eee8;
        }

        article {
          background: #292c30;
          border-color: #424850;
        }

        p,
        .meta,
        ul {
          color: #c9c2b7;
        }

        svg {
          background: #202326;
          border-color: #444a52;
        }

        .line-b {
          stroke: #f2eee7;
        }

        .vertex {
          fill: #f2eee7;
        }
      }
    </style>
  </head>
  <body>
    <h1>Folding Sequence Fixture Review</h1>
    <p>
      Phase 0 review surface for the folding sequence roadmap. These drawings
      show crease-pattern topology only; planner output is intentionally marked
      <code>not_implemented</code> until real rewrite rules exist.
    </p>
    <div class="legend">
      <span>Boundary</span>
      <span class="m">Mountain</span>
      <span class="v">Valley</span>
      <span class="f">Flat</span>
    </div>
    <main id="fixtures" class="grid"></main>
    <script type="module">
      const root = document.querySelector("#fixtures");
      const manifest = await fetch("manifest.json").then((response) => response.json());

      for (const fixture of manifest.fixtures) {
        const fold = await fetch(fixture.file).then((response) => response.json());
        const expected = await fetch(fixture.expected_artifact).then((response) => response.json());
        root.appendChild(renderFixture(fixture, fold, expected));
      }

      function renderFixture(fixture, fold, expected) {
        const article = document.createElement("article");
        const title = document.createElement("h2");
        title.textContent = fixture.id;
        article.appendChild(title);

        const meta = document.createElement("div");
        meta.className = "meta";
        for (const label of [
          fixture.category,
          `future: ${fixture.expected_v1_status}`,
          `now: ${expected.status}`,
        ]) {
          const pill = document.createElement("span");
          pill.className = "pill";
          pill.textContent = label;
          meta.appendChild(pill);
        }
        article.appendChild(meta);
        article.appendChild(renderFold(fold));

        const checks = document.createElement("ul");
        for (const check of fixture.visual_checks) {
          const item = document.createElement("li");
          item.textContent = check;
          checks.appendChild(item);
        }
        article.appendChild(checks);
        return article;
      }

      function renderFold(fold) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "-0.08 -0.08 1.16 1.16");
        svg.setAttribute("role", "img");
        svg.setAttribute("aria-label", fold.frame_title ?? fold.file_title ?? "FOLD fixture");

        fold.edges_vertices.forEach(([a, b], index) => {
          const pa = fold.vertices_coords[a];
          const pb = fold.vertices_coords[b];
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          const assignment = fold.edges_assignment?.[index]?.toLowerCase() ?? "u";
          line.setAttribute("class", `line-${assignment}`);
          line.setAttribute("x1", pa[0]);
          line.setAttribute("y1", 1 - pa[1]);
          line.setAttribute("x2", pb[0]);
          line.setAttribute("y2", 1 - pb[1]);
          svg.appendChild(line);
        });

        fold.vertices_coords.forEach(([x, y]) => {
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("class", "vertex");
          circle.setAttribute("cx", x);
          circle.setAttribute("cy", 1 - y);
          circle.setAttribute("r", "0.012");
          svg.appendChild(circle);
        });
        return svg;
      }
    </script>
  </body>
</html>
